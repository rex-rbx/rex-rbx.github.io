<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>vibecoded shit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body style="margin:0; padding:0; background:#0a0c12; font-family:'Inter',sans-serif; overflow-x:hidden;"><script>
    (function() {
        const root = document.body;
        root.style.margin = '0';
        root.style.padding = '0';
        root.style.backgroundColor = '#0a0c12';
        root.style.fontFamily = "'Inter', sans-serif";
        root.style.overflowX = 'hidden';
        root.style.color = '#f0f3fa';
        const app = document.createElement('div');
        app.id = 'atom-app';
        root.appendChild(app);
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0c12;
                font-family: 'Inter', sans-serif;
            }
            .atom-bg-glow {
                position: fixed;
                top: -20%;
                left: -20%;
                width: 140%;
                height: 140%;
                background: radial-gradient(circle at 30% 40%, rgba(80, 70, 240, 0.15), rgba(10, 12, 18, 0) 70%);
                pointer-events: none;
                z-index: 0;
                animation: floatGlow 18s infinite alternate;
            }
            @keyframes floatGlow {
                0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
                100% { transform: translate(3%, 2%) scale(1.08); opacity: 1; }
            }
            .atom-container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 2rem 2rem 4rem;
                position: relative;
                z-index: 2;
            }
            .atom-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                margin-bottom: 3rem;
                backdrop-filter: blur(12px);
                background: rgba(18, 20, 28, 0.65);
                border-radius: 2.5rem;
                padding: 0.8rem 2rem;
                border: 1px solid rgba(100, 110, 250, 0.25);
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            }
            .logo-area {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .atom-icon {
                background: linear-gradient(135deg, #5f7aff, #3b44e0);
                width: 44px;
                height: 44px;
                border-radius: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 26px;
                box-shadow: 0 5px 15px rgba(59, 68, 224, 0.4);
            }
            .logo-text {
                font-size: 1.8rem;
                font-weight: 800;
                letter-spacing: -0.5px;
                background: linear-gradient(120deg, #ffffff, #b7c2ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }

            .badge {
                background: rgba(95, 122, 255, 0.2);
                border-radius: 30px;
                padding: 6px 14px;
                font-size: 0.8rem;
                font-weight: 500;
                border: 1px solid rgba(95, 122, 255, 0.5);
                color: #b7c2ff;
            }
            .hero-section {
                margin-bottom: 3rem;
                background: linear-gradient(120deg, rgba(28, 32, 46, 0.5), rgba(18, 20, 28, 0.7));
                border-radius: 2rem;
                padding: 2.5rem 2rem;
                backdrop-filter: blur(8px);
                border: 1px solid rgba(100, 110, 250, 0.3);
                text-align: center;
            }
            .hero-title {
                font-size: 3rem;
                font-weight: 800;
                background: linear-gradient(135deg, #FFFFFF, #99a8ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 1rem;
            }
            .hero-desc {
                font-size: 1.1rem;
                color: #b9c3e6;
                max-width: 600px;
                margin: 0 auto 2rem auto;
            }
            .stat-badge {
                display: inline-flex;
                gap: 20px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .stat-item {
                background: rgba(0,0,0,0.3);
                border-radius: 60px;
                padding: 8px 18px;
                font-size: 0.85rem;
                font-weight: 500;
                backdrop-filter: blur(4px);
            }
            .scripts-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 1.8rem;
                margin-top: 2rem;
            }
            .script-card {
                background: rgba(22, 25, 37, 0.8);
                backdrop-filter: blur(4px);
                border-radius: 1.8rem;
                padding: 1.5rem;
                transition: all 0.25s ease;
                border: 1px solid rgba(80, 100, 255, 0.2);
                box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            }
            .script-card:hover {
                transform: translateY(-6px);
                border-color: rgba(110, 130, 255, 0.6);
                background: rgba(28, 32, 48, 0.9);
                box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
            }
            .card-header {
                margin-bottom: 16px;
            }
            .script-name {
                font-size: 1.5rem;
                font-weight: 700;
                letter-spacing: -0.3px;
            }
            .script-desc {
                font-size: 0.9rem;
                color: #bcc3df;
                margin-bottom: 1.4rem;
                line-height: 1.4;
            }
            .code-preview {
                background: #0c0e16;
                border-radius: 1rem;
                padding: 0.8rem 1rem;
                font-family: 'Menlo', 'Fira Code', monospace;
                font-size: 0.75rem;
                color: #b0c4ff;
                margin-bottom: 1.2rem;
                border-left: 3px solid #5f7aff;
                white-space: pre-wrap;
                word-break: break-all;
                max-height: 100px;
                overflow-y: auto;
            }
            .copy-btn {
                background: linear-gradient(95deg, #2e3a6e, #1f2748);
                border: none;
                color: white;
                padding: 8px 18px;
                border-radius: 40px;
                font-weight: 600;
                font-size: 0.75rem;
                cursor: pointer;
                transition: 0.2s;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-family: 'Inter', sans-serif;
            }
            .copy-btn:hover {
                background: linear-gradient(95deg, #4c5ed0, #2a3280);
                transform: scale(0.98);
            }
            .empty-state {
                grid-column: 1/-1;
                text-align: center;
                padding: 4rem 2rem;
                background: rgba(18, 20, 28, 0.5);
                border-radius: 2rem;
                border: 1px dashed rgba(100, 110, 250, 0.4);
            }
            .empty-state i {
                font-size: 4rem;
                color: #5f7aff;
                margin-bottom: 1rem;
                opacity: 0.6;
            }
            .empty-state h3 {
                margin-bottom: 0.5rem;
                font-weight: 600;
            }
            .empty-state p {
                color: #7f89b3;
            }
            .footer {
                margin-top: 4rem;
                text-align: center;
                padding: 1.8rem;
                border-top: 1px solid rgba(100, 110, 250, 0.2);
                font-size: 0.85rem;
                color: #7f89b3;
            }
            @media (max-width: 700px) {
                .atom-container { padding: 1rem; }
                .hero-title { font-size: 2rem; }
                .atom-header { flex-direction: column; gap: 15px; }
            }
            .toast-msg {
                position: fixed;
                bottom: 25px;
                left: 50%;
                transform: translateX(-50%);
                background: #1e243fdd;
                backdrop-filter: blur(20px);
                color: white;
                padding: 12px 24px;
                border-radius: 60px;
                font-size: 0.85rem;
                font-weight: 500;
                z-index: 999;
                border: 1px solid #6c7eff;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.2s;
            }
        `;
        document.head.appendChild(styleSheet);
        const scriptsData = [
          // ref below!!!
            // { name: "name of script", desc: "desc here", code: "loadstring(game:HttpGet('url'))()" },
            {name:"Adopt Me Anti Trade Stealer", desc:"prevents stealers from stealing ur ADM pets",code:`loadstring(game:HttpGet("https://rex-rbx.github.io/scripts/AdoptMeAntiTradeStealer.luau", true))()`}
        ];
        function showToast(message, isError = false) {
            let existingToast = document.querySelector('.toast-msg');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.textContent = message;
            toast.style.background = isError ? "#c44545dd" : "#1e243fdd";
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '1'; }, 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 2200);
        }
        function copyScript(code) {
            navigator.clipboard.writeText(code).then(() => {
                showToast(`copied to clipboard!`, false);
            }).catch(() => {
                showToast(`failed to copy...`, true);
            });
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        function escapeHtmlAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function renderScripts() {
            const gridContainer = document.getElementById('scripts-grid-container');
            if (!gridContainer) return;
            gridContainer.innerHTML = '';
            if (scriptsData.length === 0) {
                gridContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-code"></i>
                        <h3>No scripts loaded</h3>
                        <p>Add your scripts to the <code style="background:#1e243f; padding:2px 6px; border-radius:6px;">scriptsData</code> array</p>
                    </div>
                `;
                return;
            }
            scriptsData.forEach(script => {
                const card = document.createElement('div');
                card.className = 'script-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="script-name"><i class="fas fa-scroll" style="font-size:1.2rem; margin-right:8px; color:#5f7aff;"></i>${escapeHtml(script.name)}</span>
                    </div>
                    <div class="script-desc">${escapeHtml(script.desc)}</div>
                    <div class="code-preview">${escapeHtml(script.code)}</div>
                    <button class="copy-btn" data-code="${escapeHtmlAttr(script.code)}"><i class="fas fa-copy"></i> Copy Script</button>
                `;
                const copyButton = card.querySelector('.copy-btn');
                const fullCode = script.code;
                copyButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyScript(fullCode);
                });
                gridContainer.appendChild(card);
            });
        }
        function buildUI() {
            const glowDiv = document.createElement('div');
            glowDiv.className = 'atom-bg-glow';
            app.appendChild(glowDiv);
            const container = document.createElement('div');
            container.className = 'atom-container';
            app.appendChild(container);
            const header = document.createElement('header');
            header.className = 'atom-header';
            header.innerHTML = `
                <div class="logo-area">
                    <div class="atom-icon"><i class="fas fa-atom" style="color:white;"></i></div>
                    <div class="logo-text">atom</div>
                    <div class="badge"><i class="fas fa-bolt"></i> ready to use shitscripts</div>
                </div>
            `;
            container.appendChild(header);
            const hero = document.createElement('div');
            hero.className = 'hero-section';
            hero.innerHTML = `
                <div class="hero-title"><i class="fas fa-code-branch"></i> atom scripts</div>
                <div class="hero-desc">shitty scripts for your enjoyment</div>
                <div class="stat-badge">
                    <span class="stat-item"><i class="fas fa-shield-alt"></i> 100% free</span>
                    <span class="stat-item"><i class="fas fa-bolt"></i> keyless</span>
                    <span class="stat-item"><i class="fas fa-bolt"></i> source avaliable, dont get it confused with open source</span>
                </div>
            `;
            container.appendChild(hero);
            const scriptsTitle = document.createElement('div');
            scriptsTitle.style.display = 'flex';
            scriptsTitle.style.justifyContent = 'space-between';
            scriptsTitle.style.alignItems = 'baseline';
            scriptsTitle.style.flexWrap = 'wrap';
            scriptsTitle.style.marginBottom = '1rem';
            scriptsTitle.innerHTML = `<h2 style="font-weight:700; letter-spacing:-0.3px;"><i class="fas fa-terminal"></i> Script Library</h2><span style="font-size:0.8rem; background:#161a26; padding:4px 12px; border-radius:40px;">${scriptsData.length} scripts</span>`;
            container.appendChild(scriptsTitle);
            const gridWrap = document.createElement('div');
            gridWrap.id = 'scripts-grid-container';
            gridWrap.className = 'scripts-grid';
            container.appendChild(gridWrap);
            const footer = document.createElement('div');
            footer.className = 'footer';
            footer.innerHTML = `© 2026 Atom. All Rights Reserved.`;
            container.appendChild(footer);
            renderScripts();
        }
        function addSpotlight() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '1';
            canvas.style.opacity = '0.2';
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            function drawGlow() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const grad = ctx.createRadialGradient(mouseX, mouseY, 50, mouseX, mouseY, 400);
                grad.addColorStop(0, 'rgba(80, 100, 255, 0.1)');
                grad.addColorStop(1, 'rgba(10, 12, 18, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                requestAnimationFrame(drawGlow);
            }
            drawGlow();
            app.appendChild(canvas);
        }
        const styleFix = document.createElement('style');
        styleFix.textContent = `#atom-app { position: relative; z-index: 2; } canvas { position: fixed; top:0; left:0; z-index:1; } .atom-container { z-index:3; position:relative; } .atom-bg-glow { z-index:0; }`;
        document.head.appendChild(styleFix);
        buildUI();
        addSpotlight();
    })();
</script></body>
</html>
